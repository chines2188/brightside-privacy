<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Bright Side ☀️ — Web</title>
<meta property="og:site_name" content="Bright Side">
<meta property="og:title" content="Bright Side ☀️ on the web">
<meta property="og:description" content="Your feed, your people, your calls — right in the browser.">
<meta property="og:image" content="https://getbrightsideapp.com/icon.png">
<style>
:root{--cream:#FFF7EC;--card:#FFFDF8;--ink:#2B2433;--muted:#8a7f95;--orange:#F4A623;--deep:#E8890C;--dark:#231a06;--line:#F3D6AE}
*{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(180deg,#FFF7EC,#FFE8CE 55%,#FFD9B8);min-height:100vh;color:var(--ink)}
#app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:20;background:rgba(255,247,236,.92);backdrop-filter:blur(10px);padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
header h1{font-size:19px;font-weight:900}
header .who{font-size:12.5px;color:var(--muted);font-weight:700}
main{flex:1;padding:14px 14px 90px}
nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;justify-content:center;gap:6px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(255,251,244,.95);backdrop-filter:blur(10px);border-top:1px solid var(--line)}
nav button{flex:1;max-width:130px;border:0;background:none;font:inherit;font-weight:800;font-size:13px;color:var(--muted);padding:9px 4px;border-radius:14px;cursor:pointer}
nav button.on{background:var(--orange);color:var(--dark)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 4px 14px rgba(180,120,40,.08)}
.btn{display:block;width:100%;text-align:center;border:0;font:inherit;font-weight:900;font-size:15.5px;border-radius:999px;padding:14px;cursor:pointer;background:linear-gradient(135deg,#FFD166,#F4A623,#E8890C);color:var(--dark);margin-top:12px;text-decoration:none}
.btn.dark{background:var(--dark);color:#FFD166}
input,textarea{width:100%;font:inherit;font-size:15px;border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;background:#fff;outline:none;margin-top:10px}
.center{text-align:center}
.sun{font-size:52px}
.muted{color:var(--muted);font-size:13.5px;line-height:1.5}
.err{color:#C9362F;font-weight:700;font-size:13.5px;margin-top:10px;min-height:18px}
/* stories rail */
.rail{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 12px;scrollbar-width:none}
.rail::-webkit-scrollbar{display:none}
.story{flex:0 0 74px;text-align:center;cursor:pointer}
.story .ring{width:64px;height:64px;border-radius:50%;padding:3px;margin:0 auto;background:linear-gradient(135deg,#FFD166,#E8890C)}
.story img,.story .ph{width:100%;height:100%;border-radius:50%;object-fit:cover;background:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid #fff}
.story .lbl{font-size:11px;font-weight:700;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* feed */
.post .head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.post .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#FFD166,#E8890C);display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:16px;overflow:hidden}
.post .av img{width:100%;height:100%;object-fit:cover}
.post .nm{font-weight:800;font-size:14.5px}.post .us{color:var(--muted);font-size:12px}
.post img.media{width:100%;border-radius:14px;display:block;background:#eee}
.post .vid{position:relative;cursor:pointer}
.post .vid .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:46px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.post .cap{font-size:14.5px;line-height:1.45;margin-top:9px}
.post .meta{color:var(--muted);font-size:12.5px;margin-top:7px}
/* messages */
.convo{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px solid var(--line);cursor:pointer}
.convo:last-child{border-bottom:0}
.convo .av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#FFD166,#E8890C);display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:18px;overflow:hidden;flex:none}
.convo .av img{width:100%;height:100%;object-fit:cover}
.convo .nm{font-weight:800;font-size:15px}.convo .lastm{color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60vw}
.thread{display:flex;flex-direction:column;gap:6px;padding-bottom:8px}
.bub{max-width:78%;padding:9px 13px;border-radius:16px;font-size:14.5px;line-height:1.4;word-wrap:break-word}
.bub.me{align-self:flex-end;background:var(--orange);color:var(--dark);border-bottom-right-radius:5px}
.bub.them{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:5px}
.sendrow{position:fixed;bottom:64px;left:0;right:0;z-index:25;max-width:560px;margin:0 auto;display:flex;gap:8px;padding:8px 14px calc(8px + env(safe-area-inset-bottom))}
.sendrow input{margin:0;flex:1}
.sendrow button{border:0;font:inherit;font-weight:900;background:var(--orange);color:var(--dark);border-radius:999px;padding:0 20px;cursor:pointer}
.back{cursor:pointer;font-weight:900;color:var(--deep);font-size:14px;margin-bottom:8px;display:inline-block}
.hide{display:none!important}
.spin{text-align:center;padding:30px;color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>☀️ Bright Side</h1>
    <div class="who" id="who"></div>
  </header>
  <main id="main"></main>
  <nav id="nav" class="hide">
    <button data-v="feed">☀️ <span data-i18n="feed">Feed</span></button>
    <button data-v="msgs">💬 <span data-i18n="msgs">Messages</span></button>
    <button data-v="call">📞 <span data-i18n="call">Call</span></button>
  </nav>
</div>
<script>
/* ── Bright Side Web (Phase 2 v1, July 19 2026) ─────────────────────────────
   Vanilla, single-file, same REST API as the app. Views: login → feed
   (stories rail + moments) · messages (inbox → thread, 8s poll) · call
   (start a Chill Spot in the browser via chill.html, which owns LiveKit). */
var API = 'https://resplendent-tenderness-production.up.railway.app';
var ES = /^es/i.test(navigator.language || '');
var T = ES
  ? { feed:'Inicio', msgs:'Mensajes', call:'Llamar', login:'Entrar', welcome:'Bienvenido de vuelta ☀️', user:'Usuario o correo', pass:'Contraseña', signin:'Entrar', noacct:'¿No tienes cuenta? Descarga la app — es gratis', wrong:'Usuario o contraseña incorrectos.', stories:'Historias', newhere:'nuevo 👋', writemsg:'Mensaje…', send:'Enviar', nomsgs:'Aún no hay conversaciones — empieza una en la app ☀️', startcall:'🎥 Abrir una sala de llamada', callsub:'Se abre tu sala en el navegador — comparte el enlace o el código con quien quieras. Video, voz y subtítulos.', joincode:'Unirme con un código', logout:'Salir', loading:'Cargando…', watch:'Ver video ▶', empty:'Nada por aquí todavía — ¡vuelve pronto! ☀️' }
  : { feed:'Feed', msgs:'Messages', call:'Call', login:'Log in', welcome:'Welcome back ☀️', user:'Username or email', pass:'Password', signin:'Sign in', noacct:"No account? Get the app — it's free", wrong:'Wrong username or password.', stories:'Stories', newhere:'new 👋', writemsg:'Message…', send:'Send', nomsgs:'No conversations yet — start one in the app ☀️', startcall:'🎥 Open a call room', callsub:'Your room opens right in the browser — share the link or code with anyone. Video, voice, captions.', joincode:'Join with a code', logout:'Log out', loading:'Loading…', watch:'Watch video ▶', empty:'Nothing here yet — check back soon! ☀️' };
document.querySelectorAll('[data-i18n]').forEach(function(el){ el.textContent = T[el.getAttribute('data-i18n')] || el.textContent; });

var S = { user: null, token: null, view: 'feed', convo: null, pollTimer: null };
try { S.user = localStorage.getItem('bsw_user'); S.token = localStorage.getItem('bsw_token'); } catch (e) {}
// ⚡ warm the server the moment the page opens — login feels instant instead of
// waiting out a cold start.
try { fetch(API + '/api/health').catch(function(){}); } catch (e) {}

function api(path, body) {
  body = body || {};
  if (S.token) body.token = S.token;
  return fetch(API + path, {
    method: 'POST',
    headers: Object.assign({ 'Content-Type': 'application/json' }, S.token ? { Authorization: 'Bearer ' + S.token } : {}),
    body: JSON.stringify(Object.assign({ lang: ES ? 'es' : 'en' }, body))
  }).then(function (r) { return r.json(); });
}
function esc(v){ return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function el(id){ return document.getElementById(id); }
function main(html){ el('main').innerHTML = html; window.scrollTo(0,0); }
function avatarHtml(p, cls) {
  var photo = p && (p.photoUrl || p.photo);
  var emoji = p && p.avatar && p.avatar.emoji;
  var letter = ((p && (p.name || p.username) || '?').trim().charAt(0) || '?').toUpperCase();
  return '<div class="' + cls + '">' + (photo ? '<img src="' + esc(photo) + '" alt="">' : (emoji ? '<span style="font-size:22px">' + esc(emoji) + '</span>' : esc(letter))) + '</div>';
}

/* ── LOGIN ── */
function showLogin() {
  el('nav').classList.add('hide'); el('who').textContent = '';
  main('<div class="card center" style="margin-top:10vh;padding:26px 20px">' +
    '<div class="sun">☀️</div><h2 style="margin:8px 0 4px">' + T.welcome + '</h2>' +
    '<p class="muted">Bright Side</p>' +
    '<input id="lg_u" placeholder="' + T.user + '" autocomplete="username">' +
    '<input id="lg_p" type="password" placeholder="' + T.pass + '" autocomplete="current-password">' +
    '<div class="err" id="lg_e"></div>' +
    '<button class="btn" id="lg_go">' + T.signin + '</button>' +
    '<a class="btn dark" href="https://apps.apple.com/app/id6774821890">' + T.noacct + '</a></div>');
  el('lg_go').onclick = doLogin;
  el('lg_p').addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
}
function doLogin() {
  var u = el('lg_u').value.trim(), p = el('lg_p').value;
  if (!u || !p) return;
  el('lg_e').textContent = '…';
  api('/api/auth/login', { login: u, password: p }).then(function (r) {
    if (r && r.token && r.username) {
      S.user = r.username; S.token = r.token;
      try { localStorage.setItem('bsw_user', S.user); localStorage.setItem('bsw_token', S.token); } catch (e) {}
      boot();
    } else el('lg_e').textContent = (r && r.error) || T.wrong;
  }).catch(function () { el('lg_e').textContent = T.wrong; });
}
function logout() {
  S.user = null; S.token = null;
  try { localStorage.removeItem('bsw_user'); localStorage.removeItem('bsw_token'); } catch (e) {}
  showLogin();
}

/* ── FEED (stories rail + moments) ── */
function showFeed() {
  setTab('feed');
  main('<div class="spin">' + T.loading + '</div>');
  Promise.all([
    api('/api/status/feed', { viewer: S.user }).catch(function(){ return { groups: [] }; }),
    api('/api/moments/list', { username: S.user, mode: 'all' }).catch(function(){ return { posts: [] }; })
  ]).then(function (rs) {
    var groups = (rs[0] && rs[0].groups) || [];
    var posts = (rs[1] && rs[1].posts) || [];
    var html = '';
    if (groups.length) {
      html += '<div class="rail">' + groups.map(function (g, i) {
        var it = (g.items && g.items[g.items.length - 1]) || {};
        var pic = it.posterUrl || it.mediaUrl || g.photoUrl || '';
        return '<div class="story" data-g="' + i + '"><div class="ring">' +
          (pic ? '<img src="' + esc(pic) + '" alt="">' : '<div class="ph">☀️</div>') +
          '</div><div class="lbl">' + (g.welcome ? '👋 ' : '') + esc(g.name || '@' + g.username) + '</div></div>';
      }).join('') + '</div>';
    }
    if (!posts.length) html += '<div class="card center muted">' + T.empty + '</div>';
    html += posts.slice(0, 40).map(function (p) {
      var media = '';
      if (p.kind === 'video') {
        media = '<a class="vid" href="https://brightsidestreams.com/m/' + esc(p.id) + '" target="_blank" rel="noopener">' +
          (p.posterUrl ? '<img class="media" src="' + esc(p.posterUrl) + '" alt="">' : '') +
          '<div class="play">▶️</div></a>';
      } else {
        var urls = (p.mediaUrls && p.mediaUrls.length ? p.mediaUrls : [p.mediaUrl]).filter(Boolean);
        media = urls.slice(0, 4).map(function (u) { return '<img class="media" style="margin-top:6px" loading="lazy" src="' + esc(u) + '" alt="">'; }).join('');
      }
      return '<div class="card post"><div class="head">' + avatarHtml(p, 'av') +
        '<div><div class="nm">' + esc(p.name || p.username) + (p.flag ? ' ' + esc(p.flag) : '') + '</div><div class="us">@' + esc(p.username) + '</div></div></div>' +
        media +
        (p.caption ? '<div class="cap">' + esc(p.caption) + '</div>' : '') +
        '<div class="meta">❤️ ' + (p.likes || 0) + ' · 👁 ' + (p.views || 0) + '</div></div>';
    }).join('');
    main(html);
    // story tap → open the poster's latest item media (v1: image/lightbox-less)
    document.querySelectorAll('.story').forEach(function (elm) {
      elm.onclick = function () {
        var g = groups[+elm.getAttribute('data-g')];
        var it = g && g.items && g.items[g.items.length - 1];
        var u = it && (it.mediaUrl || it.posterUrl);
        if (u) window.open(u, '_blank', 'noopener');
      };
    });
  });
}

/* ── MESSAGES ── */
function showMsgs() {
  setTab('msgs'); stopPoll();
  main('<div class="spin">' + T.loading + '</div>');
  api('/api/messages/conversations', { username: S.user }).then(function (r) {
    var cs = (r && r.conversations) || [];
    if (!cs.length) return main('<div class="card center muted">' + T.nomsgs + '</div>');
    main('<div class="card" style="padding:4px 12px">' + cs.map(function (c, i) {
      var last = (c.last && (c.last.text || (c.last.gif && 'GIF') || (c.last.photos && '📷') || (c.last.audio && '🎙') || (c.last.video && '🎥'))) || c.lastText || '';
      return '<div class="convo" data-c="' + i + '">' + avatarHtml(c, 'av') +
        '<div style="min-width:0"><div class="nm">' + esc(c.name || '@' + (c.withUser || c.username)) + '</div>' +
        '<div class="lastm">' + esc(last) + '</div></div></div>';
    }).join('') + '</div>');
    document.querySelectorAll('.convo').forEach(function (elm) {
      elm.onclick = function () { openThread(cs[+elm.getAttribute('data-c')]); };
    });
  }).catch(function () { main('<div class="card center muted">' + T.nomsgs + '</div>'); });
}
function openThread(c) {
  S.convo = c.withUser || c.username;
  renderThreadShell(c);
  loadThread();
  S.pollTimer = setInterval(loadThread, 8000);
}
function renderThreadShell(c) {
  main('<span class="back" id="bk">‹ ' + T.msgs + '</span>' +
    '<div class="card" style="min-height:50vh"><div class="nm" style="margin-bottom:10px">' + esc(c.name || '@' + S.convo) + '</div>' +
    '<div class="thread" id="th"><div class="spin">' + T.loading + '</div></div></div>' +
    '<div class="sendrow"><input id="mtxt" placeholder="' + T.writemsg + '" autocomplete="off"><button id="msend">' + T.send + '</button></div>');
  el('bk').onclick = function () { stopPoll(); showMsgs(); };
  el('msend').onclick = sendMsg;
  el('mtxt').addEventListener('keydown', function (e) { if (e.key === 'Enter') sendMsg(); });
}
function loadThread() {
  if (!S.convo) return;
  api('/api/messages/thread', { username: S.user, withUser: S.convo }).then(function (r) {
    var ms = (r && r.messages) || [];
    var th = el('th'); if (!th) return;
    th.innerHTML = ms.map(function (m) {
      var mine = m.sender === S.user;
      var body = m.text ? esc(m.text) : (m.gif ? 'GIF 🖼' : m.photos ? '📷 Photo' : m.audio ? '🎙 Voice note' : m.video ? '🎥 Video' : '…');
      return '<div class="bub ' + (mine ? 'me' : 'them') + '">' + body + '</div>';
    }).join('');
    th.scrollTop = th.scrollHeight;
    window.scrollTo(0, document.body.scrollHeight);
  }).catch(function () {});
}
function sendMsg() {
  var t = el('mtxt').value.trim(); if (!t || !S.convo) return;
  el('mtxt').value = '';
  var th = el('th'); if (th) th.innerHTML += '<div class="bub me">' + esc(t) + '</div>';
  window.scrollTo(0, document.body.scrollHeight);
  api('/api/messages/send', { from: S.user, to: S.convo, text: t }).then(loadThread).catch(function () {});
}
function stopPoll() { if (S.pollTimer) { clearInterval(S.pollTimer); S.pollTimer = null; } S.convo = null; }

/* ── CALL ── */
function showCall() {
  setTab('call'); stopPoll();
  main('<div class="card center" style="padding:26px 20px"><div class="sun">📞</div>' +
    '<p class="muted" style="margin-top:8px">' + T.callsub + '</p>' +
    '<button class="btn" id="cgo">' + T.startcall + '</button>' +
    '<a class="btn dark" href="https://studio.brightsidestreams.com/chill.html">' + T.joincode + '</a>' +
    '<div class="err" id="cerr"></div></div>' +
    '<div class="card center"><button class="btn dark" id="lout" style="margin-top:0">' + T.logout + '</button></div>');
  el('lout').onclick = logout;
  el('cgo').onclick = function () {
    el('cerr').textContent = '…';
    api('/api/chill/room', { username: S.user, isPro: false }).then(function (r) {
      if (r && r.ok && r.room && r.room.id) {
        el('cerr').textContent = '';
        window.location.href = 'https://studio.brightsidestreams.com/chill.html?room=' + encodeURIComponent(r.room.id);
      } else el('cerr').textContent = (r && r.error) || 'Could not open a room.';
    }).catch(function () { el('cerr').textContent = 'Could not open a room.'; });
  };
}

/* ── NAV / BOOT ── */
function setTab(v) {
  S.view = v;
  document.querySelectorAll('nav button').forEach(function (b) { b.classList.toggle('on', b.getAttribute('data-v') === v); });
}
document.querySelectorAll('nav button').forEach(function (b) {
  b.onclick = function () {
    var v = b.getAttribute('data-v');
    stopPoll();
    if (v === 'feed') showFeed(); else if (v === 'msgs') showMsgs(); else showCall();
  };
});
function boot() {
  if (!S.user || !S.token) return showLogin();
  el('nav').classList.remove('hide');
  el('who').textContent = '@' + S.user;
  showFeed();
}
boot();
</script>
</body>
</html>
